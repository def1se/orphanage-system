server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: children-service
          uri: lb://children-service
          predicates:
            - Path=/api/v1/children/**
          filters:
            - StripPrefix=0

        - id: staff-service
          uri: lb://staff-service
          predicates:
            - Path=/api/v1/staff/**
          filters:
            - StripPrefix=0

        - id: adoption-service
          uri: lb://adoption-service
          predicates:
            - Path=/api/v1/adoptions/**
          filters:
            - StripPrefix=0

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/orphanage/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
