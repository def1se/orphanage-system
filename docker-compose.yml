version: '3.9'

services:

  # ─────────────────────────────────────────
  # PostgreSQL — единая БД, схемы per-service
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orphanage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Keycloak — Identity Provider
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: orphanage-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./infrastructure/keycloak/theme:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET / HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # RabbitMQ — Message Broker
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: orphanage-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Eureka Server — Service Discovery
  # ─────────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    container_name: orphanage-eureka
    restart: unless-stopped
    ports:
      - "${EUREKA_PORT}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: orphanage-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Children Service
  # ─────────────────────────────────────────
  children-service:
    build:
      context: .
      dockerfile: services/children-service/Dockerfile
    container_name: orphanage-children
    restart: unless-stopped
    ports:
      - "${CHILDREN_SERVICE_PORT}:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=children
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Staff Service
  # ─────────────────────────────────────────
  staff-service:
    build:
      context: .
      dockerfile: services/staff-service/Dockerfile
    container_name: orphanage-staff
    restart: unless-stopped
    ports:
      - "${STAFF_SERVICE_PORT}:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=staff
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Adoption Service
  # ─────────────────────────────────────────
  adoption-service:
    build:
      context: .
      dockerfile: services/adoption-service/Dockerfile
    container_name: orphanage-adoption
    restart: unless-stopped
    ports:
      - "${ADOPTION_SERVICE_PORT}:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=adoption
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Inventory Service
  # ─────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: orphanage-inventory
    restart: unless-stopped
    ports:
      - "${INVENTORY_SERVICE_PORT}:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=inventory
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Notification Service
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: orphanage-notification
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=notification
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MailHog — Email Testing Tool
  # ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: orphanage-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI

volumes:
  postgres_data:
  rabbitmq_data:
